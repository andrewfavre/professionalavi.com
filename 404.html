<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found – AVI – Audio Video Integrators</title>
    
    <meta name="robots" content="noindex, follow"> 
    
    <link rel="stylesheet" href="/style.css"> 
    
    <link rel="icon" href="/images/avi.icon_.png" sizes="32x32">
    <link rel="apple-touch-icon" href="/images/avi.icon_.png">
</head>
<body>

    <header class="site-header">
        <div class="container header-inner">
            <div class="logo">
                <a href="/">
                    <img src="/images/logo_edit.retina.png" alt="AVI – Audio Video Integrators" width="157" height="53">
                </a>
            </div>
            
            <nav class="main-nav" aria-label="Main Menu">
                <button class="menu-toggle" aria-label="Open menu" aria-expanded="false" id="mobile-menu-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24"><path d="M5 5v1.5h14V5H5zM5 12.8h14v-1.5H5v1.5zM5 19h14v-1.5H5V19z"></path></svg>
                </button>
                <ul class="nav-links" id="nav-links">
                    <li><a href="/">Home</a></li>
                    <li><a href="/commercial-audio-video/">Commercial AV</a></li>
                    <li><a href="/services/">Services</a></li>
                    <li><a href="/sonos/">Sonos</a></li>
                    <li><a href="/contact-us/">Contact</a></li>
                </ul>
            </nav>

            <div class="header-action">
                <a href="tel:3194302482" class="button phone-btn"><em>(319)</em> 430-2482</a>
            </div>
        </div>
    </header>

    <main>
        <section class="container" style="text-align: center; padding: 10vh 20px; min-height: 55vh; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h1 style="font-size: clamp(80px, 10vw, 150px); margin-bottom: 0; line-height: 1; color: var(--text-gray);">404</h1>
            <h2>Page Not Found</h2>
            <p style="margin-bottom: var(--spacing-md); max-width: 500px; font-size: 18px;">
                The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
            </p>
            <a href="/" class="button">Return to Homepage</a>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <div class="footer-logo">
                <a href="/">
                    <img src="/images/logo_edit.retina.png" alt="AVI – Audio Video Integrators" width="200" height="68" loading="lazy">
                </a>
            </div>
            <div class="footer-copy">
                <p>Copyright &copy; 2026 | <a href="/">AVI – Professional Audio Video Integrators</a></p>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('mobile-menu-btn');
            const nav = document.getElementById('nav-links');
            
            if (btn && nav) {
                btn.addEventListener('click', () => {
                    const expanded = btn.getAttribute('aria-expanded') === 'true';
                    btn.setAttribute('aria-expanded', !expanded);
                    nav.classList.toggle('active');
                });
            }
        });
    </script>
</body>
</html>
